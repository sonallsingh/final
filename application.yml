# AryogaSutra — MySQL (default). Use profile `local` for embedded H2 (see application-local.yml).
server:
  port: 8080

spring:
  application:
    name: aryogasutra-backend
  datasource:
    url: jdbc:mysql://localhost:3306/aryogasutra?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 10MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder-google-secret}
            scope: openid, profile, email
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:placeholder-facebook-app-id}
            client-secret: ${FACEBOOK_CLIENT_SECRET:placeholder-facebook-secret}
            scope: email, public_profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          facebook:
            authorization-uri: https://www.facebook.com/v19.0/dialog/oauth
            token-uri: https://graph.facebook.com/v19.0/oauth/access_token
            user-info-uri: https://graph.facebook.com/me?fields=id,name,email
            user-name-attribute: id

aryogasutra:
  jwt:
    secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    expiration-ms: 86400000
  ml-api:
    base-url: ${ML_API_URL:http://localhost:5000}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  uploads-dir: ${user.dir}/uploads/aryogasutra/reports
  allow-admin-register: ${ALLOW_ADMIN_REGISTER:false}

logging:
  level:
    com.aryogasutra: INFO
    org.springframework.security: INFO
